<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Risk Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main">
    <div class="card">

        <h1>🩺 Diabetes Risk Predictor</h1>
        <p class="subtitle">Enter your health details to check risk</p>

        <form action="/predict" method="post">

            <div class="grid">

                <div class="field">
                    <label>Pregnancies</label>
                    <input type="number" name="Pregnancies"
                    value="{{ form_data.Pregnancies if form_data else '' }}"
                    placeholder="e.g. 2" required>
                </div>

                <div class="field">
                    <label>Glucose (mg/dL)</label>
                    <input type="number" name="Glucose"
                    value="{{ form_data.Glucose if form_data else '' }}"
                    placeholder="e.g. 120" required>
                </div>

                <div class="field">
                    <label>Blood Pressure (mm Hg)</label>
                    <input type="number" name="BloodPressure"
                    value="{{ form_data.BloodPressure if form_data else '' }}"
                    placeholder="e.g. 70" required>
                </div>

                <div class="field">
                    <label>Skin Thickness (mm)</label>
                    <input type="number" name="SkinThickness"
                    value="{{ form_data.SkinThickness if form_data else '' }}"
                    placeholder="e.g. 20" required>
                </div>

                <div class="field">
                    <label>Insulin (µU/ml)</label>
                    <input type="number" name="Insulin"
                    value="{{ form_data.Insulin if form_data else '' }}"
                    placeholder="e.g. 85" required>
                </div>

                <div class="field">
                    <label>BMI (kg/m²)</label>
                    <input type="number" step="any" name="BMI"
                    value="{{ form_data.BMI if form_data else '' }}"
                    placeholder="e.g. 25" required>
                </div>

                <div class="field">
                    <label>Diabetes Pedigree Function</label>
                    <input type="number" step="any" name="DiabetesPedigreeFunction"
                    value="{{ form_data.DiabetesPedigreeFunction if form_data else '' }}"
                    placeholder="e.g. 0.5" required>
                </div>

                <div class="field">
                    <label>Age (years)</label>
                    <input type="number" name="Age"
                    value="{{ form_data.Age if form_data else '' }}"
                    placeholder="e.g. 30" required>
                </div>

            </div>

            <button type="submit">Check Risk</button>

        </form>

        {% if prediction_text %}
        <div class="result 
            {% if 'Not' in prediction_text %}safe{% else %}risk{% endif %}">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
